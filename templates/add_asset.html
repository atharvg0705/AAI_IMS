{% extends 'base.html' %}
{% block top_title %}Add New Asset{% endblock %}
{% block extra_css %}
<style>
    .form-card {
        max-width: 900px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 1.5rem 1.75rem 1.25rem;
    }
    .form-section-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--primary);
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
        gap: 1rem 1.5rem;
        margin-bottom: 1.2rem;
    }
    label {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        display: block;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
        width: 100%;
        padding: 0.55rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 0.9rem;
    }
    .form-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
</style>
{% endblock %}
{% block content %}
<h1 class="page-title">Add New Asset</h1>

<form method="POST">
    <div class="form-card">
        <div class="form-section-title">➕ Asset Details</div>

        <div class="form-grid">
            <div>
                <label>Asset Name *</label>
                <input type="text" name="asset_name" required>
            </div>
            <div>
                <label>Serial Number *</label>
                <input type="text" name="serial_number" required>
            </div>
            <div>
                <label>Category *</label>
                <select name="category" required>
                    <option value="">Select</option>
                    <option>Server</option>
                    <option>Laptop</option>
                    <option>Network Equipment</option>
                    <option>Power Supply</option>
                    <option>Security</option>
                    <option>Printer</option>
                </select>
            </div>
            <div>
                <label>Location *</label>
                <input type="text" name="location" required>
            </div>
            <div>
                <label>Assign to Employee</label>
                <select name="assigned_to">
                    <option value="">Unassigned</option>
                    {% for employee in employees %}
                    <option value="{{ employee.name }}">{{ employee.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Status *</label>
                <select name="status" required>
                    <option>In Store</option>
                    <option>Deployed</option>
                    <option>In Maintenance</option>
                </select>
            </div>
            <div>
                <label>Asset Tag</label>
                <input type="text" name="asset_tag">
            </div>
            <div>
                <label>Vendor Name</label>
                <input type="text" name="vendor_name">
            </div>
            <div>
                <label>Purchase Cost</label>
                <input type="number" step="0.01" name="purchase_cost">
            </div>
            <div>
                <label>Warranty Expiry</label>
                <input type="date" name="warranty_expiry">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Asset</button>
            <a href="/assets" class="btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
