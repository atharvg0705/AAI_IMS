{% extends 'base.html' %}
{% block top_title %}Add Employee{% endblock %}
{% block extra_css %}
<style>
    .form-card {
        max-width: 600px;
        background: var(--card-bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 2rem;
        margin: 0 auto;
    }
    .form-section-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: var(--primary);
    }
    .form-group {
        margin-bottom: 1rem;
    }
    label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
        display: block;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
        width: 100%;
        padding: 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 0.9rem;
    }
    .form-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1.5rem;
    }
    .help-text {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
    }
</style>
{% endblock %}
{% block content %}
<h1 class="page-title">Add Employee</h1>

<form method="POST">
    <div class="form-card">
        <div class="form-section-title">➕ Employee Details</div>

        <div class="form-group">
            <label>Employee ID *</label>
            <input type="text" name="employee_id" placeholder="e.g., AAI-EMP-2024-001" required>
        </div>

        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mobile">
        </div>

        <div class="form-group">
            <label>Department *</label>
            <select name="department" required>
                <option>IT</option>
                <option>Operations</option>
                <option>Maintenance</option>
                <option>Finance</option>
                <option>Administration</option>
            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" name="designation">
        </div>

        <hr style="margin: 1.5rem 0; border: 1px solid var(--border);">

        <div class="form-section-title">🔐 Login Credentials</div>

        <div class="form-group">
            <label>Username (for login) *</label>
            <input type="text" name="username" placeholder="e.g., john.doe or EMP001" required>
            <div class="help-text">Employee will use this to login</div>
        </div>

        <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" value="password123" required>
            <div class="help-text">Default: password123 (employee can change later)</div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Employee</button>
            <a href="/employees" class="btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
